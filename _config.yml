# Site settings
title: BRIDGE (Bristol Research Initiative for the Dynamic Global Environment)
subtitle: School of Geographical Sciences, University of Bristol
description: >-
  The BRIDGE research group works to understand the past, present, and future of the Earth system, with a focus on climate, biogeochemistry, ecology, and dynamics.
author: BRIDGE
url: https://FannyMonteiro.github.io/bridge.github.io
baseurl: ""
repository: FannyMonteiro.github.io/bridge.github.io
github_username: bridge

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "default"
logo: /assets/images/logos/bgc-logo.png

# Build settings
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-include-cache

# Collections
collections:
  pages:
    output: true
    permalink: /:path/
  people:
    output: false
  resources:
    output: false

# Site author (appears in footer)
author:
  name: BRIDGE
  avatar: /assets/images/logos/bgc-logo.png
  bio: "Research on past, present and future Earth Systems"
  location: "Bristol, UK"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:glaciology@bristol.ac.uk"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/bristol-glaciology"

# Footer links
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/bristol-glaciology"
    - label: "University of Bristol"
      icon: "fas fa-fw fa-link"
      url: "https://www.bristol.ac.uk/"

# Front Matter Defaults
defaults:
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      classes: wide
      author_profile: false
      show_date: false
  # _posts
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      share: false
      show_date: false

# Enable JavaScript
enable_js: true
